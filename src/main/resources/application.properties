spring.application.name=aulaProjeto
server.port=${PORT:8080}

# Banco: DATABASE_URL do Render já vem como postgresql://user:pass@host:port/db
# Basta prefixar com "jdbc:" para o driver JDBC aceitar
spring.datasource.url=jdbc:${DATABASE_URL:postgresql://localhost:5432/aulaProjeto}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
