<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Realis Obscura | Operação Concluída</title>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body>

    <!-- ═══ NAVBAR ═══ -->
    <nav class="navbar">
        <div class="navbar-brand">
            <img th:src="@{/img/R.svg}" alt="Realis Obscura">
            <span>Realis Obscura</span>
        </div>

        <ul class="navbar-nav">
            <li><a th:href="@{/}">Feed</a></li>
            <li><a th:href="@{/itens}">Itens</a></li>
            <li><a th:href="@{/teorias}">Teorias</a></li>
            <li sec:authorize="isAuthenticated()">
                <a th:href="@{/listar}">Arquivos</a>
            </li>
        </ul>

        <div class="navbar-user">
            <span sec:authorize="isAuthenticated()">
                <span class="user-greeting">Agente</span>
                <span class="user-name" sec:authentication="name"></span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <button type="submit" class="btn-logout">Sair</button>
                </form>
            </span>
            <span sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}" class="btn-login">Acessar</a>
            </span>
        </div>
    </nav>

    <!-- ═══ CONTEÚDO ═══ -->
    <div class="container">
        <main>
            <div class="card animate-in" style="text-align: center; padding: 40px;">
                <h2 style="border-left: none; padding-left: 0; text-align: center; margin-bottom: 16px;">
                    Status: Autenticado
                </h2>
                <p style="color: var(--success); font-size: 1.1rem;">
                    &#10003; As credenciais foram validadas com sucesso no banco de dados.
                </p>
                <p style="margin-top: 20px;">
                    <a th:href="@{/}" class="btn">Retornar ao Feed</a>
                </p>
            </div>
        </main>
    </div>

    <!-- ═══ FOOTER ═══ -->
    <footer class="site-footer">
        <p><span>Realis Obscura</span> &copy; 2026 — A verdade não se esconde. Ela é escondida.</p>
    </footer>

</body>
</html>
