<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Realis Obscura | Registro de Agente</title>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body class="auth-body">

    <div class="auth-card animate-in">
        <h1>Realis Obscura</h1>
        <p class="auth-subtitle">Solicitação de Credenciais</p>

        <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>
        <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

        <form th:action="@{/registro}" method="post" th:object="${registroRequest}">
            <div class="form-group">
                <label for="nome">Codinome do Agente</label>
                <input type="text" id="nome" th:field="*{nome}"
                       placeholder="Escolha seu codinome..." required autofocus>
                <span th:if="${#fields.hasErrors('nome')}"
                      th:errors="*{nome}" class="field-error"></span>
            </div>

            <div class="form-group">
                <label for="email">Canal de Contato (E-mail)</label>
                <input type="email" id="email" th:field="*{email}"
                       placeholder="agente@realisobscura.org" required>
                <span th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}" class="field-error"></span>
            </div>

            <div class="form-group">
                <label for="password">Chave de Criptografia</label>
                <input type="password" id="password" th:field="*{password}"
                       placeholder="Mínimo 6 caracteres..." required>
                <span th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}" class="field-error"></span>
            </div>

            <button type="submit" class="btn btn-block">Criptografar Identidade</button>
        </form>

        <p class="auth-footer">
            Já é um agente?
            <a th:href="@{/login}">Acessar terminal</a>
        </p>
        <p class="auth-footer">
            <a th:href="@{/}">← Retornar ao Feed Público</a>
        </p>
    </div>

</body>
</html>
