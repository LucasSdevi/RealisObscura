<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${post.id == null} ? 'Realis Obscura | Novo Post' : 'Realis Obscura | Editar Post'">Realis Obscura | Post</title>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">
            <img th:src="@{/img/R.svg}" alt="Realis Obscura">
            <span>Realis Obscura</span>
        </div>
        <ul class="navbar-nav">
            <li><a th:href="@{/}">Feed</a></li>
            <li><a th:href="@{/itens}">Itens</a></li>
            <li><a th:href="@{/teorias}">Teorias</a></li>
            <li sec:authorize="isAuthenticated()">
                <a th:href="@{/listar}">Agentes</a>
            </li>
            <li sec:authorize="hasAuthority('admin')">
                <a th:href="@{/admin}" class="active">Painel</a>
            </li>
        </ul>
        <div class="navbar-user">
            <span sec:authorize="isAuthenticated()">
                <span class="user-greeting">Admin</span>
                <span class="user-name" sec:authentication="name"></span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <button type="submit" class="btn-logout">Sair</button>
                </form>
            </span>
        </div>
    </nav>

    <div class="container">
        <header class="site-header">
            <h1 th:text="${post.id == null} ? 'Novo Arquivo Confidencial' : 'Editar Arquivo'">Arquivo</h1>
            <p class="tagline" th:text="${post.id == null} ? 'Registrar nova evidência na base de dados.' : 'Atualizar informações do arquivo.'">Descrição</p>
        </header>

        <main>
            <div class="form-container animate-in" style="max-width: 700px;">
                <form th:action="${post.id == null} ? @{/admin/posts/novo} : @{/admin/posts/editar/{id}(id=${post.id})}"
                      th:object="${post}" method="POST">

                    <div class="form-group">
                        <label for="titulo">Título do Arquivo</label>
                        <input type="text" id="titulo" th:field="*{titulo}"
                               placeholder="Ex: O Incidente de Varginha 1996" required autofocus>
                    </div>

                    <div class="form-group">
                        <label for="categoria">Classificação</label>
                        <select id="categoria" th:field="*{categoria}" required>
                            <option value="">Selecione uma categoria...</option>
                            <option th:each="cat : ${categorias}"
                                    th:value="${cat.name()}"
                                    th:text="${cat.name()}"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="conteudo">Conteúdo do Arquivo</label>
                        <textarea id="conteudo" th:field="*{conteudo}"
                                  placeholder="Descreva as evidências, testemunhas, fontes..."
                                  rows="12" required
                                  style="background-color: var(--bg-input); border: 1px solid var(--border-accent); color: var(--text-primary); padding: 12px; font-family: var(--font-sans); font-size: 0.9rem; width: 100%; resize: vertical;"></textarea>
                    </div>

                    <button type="submit" class="btn btn-block"
                            th:text="${post.id == null} ? 'Classificar e Arquivar' : 'Atualizar Arquivo'">
                        Salvar
                    </button>
                </form>
            </div>

            <div class="mt-3 text-center">
                <a th:href="@{/admin}">← Voltar ao Painel</a>
            </div>
        </main>
    </div>

    <footer class="site-footer">
        <p><span>Realis Obscura</span> &copy; 2026 — A verdade não se esconde. Ela é escondida.</p>
    </footer>

</body>
</html>
