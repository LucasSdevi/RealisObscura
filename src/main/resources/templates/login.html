<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Realis Obscura | Acesso Restrito</title>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body class="auth-body">

    <div class="auth-card animate-in">
        <h1>Realis Obscura</h1>
        <p class="auth-subtitle">Terminal de Acesso Confidencial</p>

        <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>
        <div th:if="${logoutMsg}" class="alert alert-success" th:text="${logoutMsg}"></div>
        <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

        <form th:action="@{/login}" method="post" th:object="${loginRequest}">
            <div class="form-group">
                <label for="nome">Codinome do Agente</label>
                <input type="text" id="nome" th:field="*{nome}"
                       placeholder="Seu codinome..." required autofocus>
                <span th:if="${#fields.hasErrors('nome')}"
                      th:errors="*{nome}" class="field-error"></span>
            </div>

            <div class="form-group">
                <label for="password">Chave de Acesso</label>
                <input type="password" id="password" th:field="*{password}"
                       placeholder="Sua senha criptografada..." required>
                <span th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}" class="field-error"></span>
            </div>

            <button type="submit" class="btn btn-block">Descriptografar e Acessar</button>
        </form>

        <p class="auth-footer">
            Não possui credenciais?
            <a th:href="@{/registro}">Solicitar cadastro</a>
        </p>
        <p class="auth-footer">
            <a th:href="@{/}">← Retornar ao Feed Público</a>
        </p>
    </div>

</body>
</html>
